<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AJU Open Voice</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f7f5f0;min-height:100vh}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f7f5f0;z-index:9999;gap:1rem}
.logo-load{font-family:'DM Serif Display',serif;font-size:1.5rem}
.aju{color:#1a5caa;font-weight:700}.open{color:#3a2e22}.voice{color:#b89c7a}
.spinner{width:32px;height:32px;border:3px solid #e4e0d8;border-top-color:#1a5caa;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-msg{font-size:.85rem;color:#9e9689}
</style>
</head>
<body>
<div id="loading">
  <div class="logo-load"><span class="aju">AJU</span> <span class="open">Open</span> <span class="voice">Voice</span></div>
  <div class="spinner"></div>
  <div class="load-msg">잠시만 기다려주세요...</div>
</div>
<div id="root"></div>
<script type="module" src="./main.jsx"></script> 
</body>
</html>
